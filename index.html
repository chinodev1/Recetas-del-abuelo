<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Las Recetas del Abuelo — Cocina Argentina</title>

  <!-- SEO & Social sharing -->
  <meta name="description" content="57 recetas caseras argentinas probadas paso a paso — masas, carnes, pastas, postres y más.">
  <meta property="og:type"        content="website">
  <meta property="og:title"       content="Las Recetas del Abuelo — Cocina Argentina">
  <meta property="og:description" content="57 recetas caseras argentinas probadas paso a paso — masas, carnes, pastas, postres y más.">
  <meta property="og:image"       content="https://chinodev1.github.io/Recetas-del-abuelo/0CA7AEBE-865D-44C7-AB72-967F7157BCC6.jpg">
  <meta property="og:url"         content="https://chinodev1.github.io/Recetas-del-abuelo/">
  <meta name="twitter:card"       content="summary_large_image">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <script>
    // Apply theme before paint to avoid flash
    document.documentElement.setAttribute('data-theme', localStorage.getItem('recetas_theme') || 'dark');
  </script>
</head>
<body>

  <!-- NOISE OVERLAY -->
  <div class="noise-overlay" aria-hidden="true"></div>

  <!-- ═══════════════════════════════════════════
       HERO
  ═══════════════════════════════════════════ -->
  <header class="hero" id="hero">
    <div class="hero-bg" aria-hidden="true"></div>
    <div class="hero-inner">
      <img
        class="hero-alfredo"
        id="hero-alfredo"
        src="0CA7AEBE-865D-44C7-AB72-967F7157BCC6.jpg"
        alt="Alfredo"
      />
      <h1 class="hero-h1" id="hero-h1">
        <span class="hero-h1-plain">Las Recetas</span>
        <em class="hero-h1-italic">del Abuelo</em>
      </h1>
      <p class="hero-sub" id="hero-sub">Recetas probadas y escritas paso a paso, para que salgan perfectas desde la primera vez</p>
      <div class="hero-stats" id="hero-stats">
        Las únicas 57 recetas que necesitás
      </div>
      <div class="search-wrap" id="hero-search">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input
          id="search"
          type="text"
          placeholder="Buscar por nombre o ingrediente…"
          autocomplete="off"
          spellcheck="false"
          aria-label="Buscar recetas"
        />
        <button id="search-clear" class="search-clear" aria-label="Limpiar búsqueda">✕</button>
      </div>
    </div>
    <div class="hero-scroll-hint" id="hero-scroll">
      <span>Scroll</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════
       CATEGORY NAV
  ═══════════════════════════════════════════ -->
  <nav class="cats-bar" id="cats-bar" aria-label="Categorías">
    <div class="cats-scroll">
    <div class="cats-inner">
      <button class="cat-btn active" data-cat="todas">
        <span class="cat-all-icon">✦</span> Todas
      </button>
      <button class="cat-btn" data-cat="masas">🍕 Masas & Pizzas</button>
      <button class="cat-btn" data-cat="carnes">🥩 Carnes</button>
      <button class="cat-btn" data-cat="pastas">🧀 Pastas</button>
      <button class="cat-btn" data-cat="guarniciones">🥔 Guarniciones</button>
      <button class="cat-btn" data-cat="salsas">🍅 Salsas</button>
      <button class="cat-btn" data-cat="basicos">🧈 Básicos</button>
      <span class="cats-sep" aria-hidden="true"></span>
      <button class="cat-btn" data-cat="postres">🍫 Postres</button>
      <span class="cats-sep" aria-hidden="true"></span>
      <button class="cat-btn" data-cat="bebidas">🍹 Bebidas</button>
      <span class="cats-sep" aria-hidden="true"></span>
      <button class="cat-btn" data-cat="favoritas">⭐ Favoritas</button>
      <button class="cat-btn" data-cat="mis-recetas">📝 Mis Recetas</button>
      <span class="cats-sep" aria-hidden="true"></span>
      <button class="theme-toggle" id="theme-toggle" aria-label="Cambiar tema">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>
    </div><!-- /cats-scroll -->
  </nav>

  <!-- ═══════════════════════════════════════════
       MAIN
  ═══════════════════════════════════════════ -->
  <main class="main" id="main">
    <p class="results-info" id="results-info"></p>
    <div class="grid" id="grid"></div>
    <div class="empty-state" id="empty" hidden>
      <div class="empty-icon">😔</div>
      <p class="empty-title">Sin resultados</p>
      <p class="empty-sub">No encontramos ninguna receta con ese nombre.</p>
      <button class="empty-btn" id="empty-reset">Ver todas las recetas</button>
    </div>
  </main>

  <!-- ═══════════════════════════════════════════
       MODAL
  ═══════════════════════════════════════════ -->
  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-label="Detalle de receta">
    <div class="modal" id="modal">
      <!-- hero image -->
      <div class="modal-img-wrap" id="modal-img-wrap">
        <img class="modal-img" id="modal-img" src="" alt="" loading="eager" />
        <div class="modal-img-overlay" id="modal-img-overlay"></div>
        <button class="modal-close" id="modal-close" aria-label="Cerrar receta">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
        </button>
        <div class="modal-img-content" id="modal-img-content"></div>
      </div>
      <!-- body -->
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       RECIPE EDITOR (Mis Recetas)
  ═══════════════════════════════════════════ -->
  <div class="editor-overlay" id="editor-overlay" aria-hidden="true">
    <div class="editor-modal" id="editor-modal">

      <div class="editor-header">
        <h2 class="editor-heading" id="editor-heading">Nueva Receta</h2>
        <button class="editor-close" id="editor-close" aria-label="Cerrar editor">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <div class="editor-body">
        <form id="editor-form" novalidate>

          <!-- Emoji + Título -->
          <div class="editor-row">
            <div class="editor-field" style="flex:0 0 auto">
              <label class="editor-label" for="ef-emoji">Emoji</label>
              <input class="editor-input editor-input-emoji" id="ef-emoji" type="text" maxlength="2" placeholder="🍽">
            </div>
            <div class="editor-field" style="flex:1">
              <label class="editor-label" for="ef-titulo">Nombre de la receta *</label>
              <input class="editor-input" id="ef-titulo" type="text" placeholder="Ej: Milanesas de pollo" required>
            </div>
          </div>

          <!-- Tiempo + Porciones + Dificultad -->
          <div class="editor-row">
            <div class="editor-field">
              <label class="editor-label" for="ef-tiempo">Tiempo</label>
              <input class="editor-input" id="ef-tiempo" type="text" placeholder="45 min">
            </div>
            <div class="editor-field">
              <label class="editor-label" for="ef-porciones">Porciones</label>
              <input class="editor-input" id="ef-porciones" type="text" placeholder="4 personas">
            </div>
            <div class="editor-field">
              <label class="editor-label" for="ef-dificultad">Dificultad</label>
              <select class="editor-select" id="ef-dificultad">
                <option value="Fácil">🟢 Fácil</option>
                <option value="Media">🟡 Media</option>
                <option value="Avanzada">🔴 Avanzada</option>
              </select>
            </div>
          </div>

          <!-- Descripción -->
          <div class="editor-field">
            <label class="editor-label" for="ef-descripcion">Descripción</label>
            <textarea class="editor-textarea" id="ef-descripcion" rows="2" placeholder="Describí brevemente la receta..."></textarea>
          </div>

          <!-- Foto URL -->
          <div class="editor-field">
            <label class="editor-label" for="ef-img">URL de foto <span class="opt">(opcional)</span></label>
            <input class="editor-input" id="ef-img" type="url" placeholder="https://images.pexels.com/photos/...">
          </div>

          <!-- Ingredientes -->
          <div class="editor-section">
            <div class="editor-section-label">Ingredientes</div>
            <div id="ef-ing-list" class="editor-list"></div>
            <button type="button" class="editor-add-btn" id="ef-ing-add">+ Agregar ingrediente</button>
          </div>

          <!-- Pasos -->
          <div class="editor-section">
            <div class="editor-section-label">Pasos</div>
            <div id="ef-paso-list" class="editor-list"></div>
            <button type="button" class="editor-add-btn" id="ef-paso-add">+ Agregar paso</button>
          </div>

          <!-- Tips -->
          <div class="editor-section">
            <div class="editor-section-label">Tips <span class="opt">(opcional)</span></div>
            <div id="ef-tip-list" class="editor-list"></div>
            <button type="button" class="editor-add-btn" id="ef-tip-add">+ Agregar tip</button>
          </div>

          <!-- Actions -->
          <div class="editor-actions">
            <button type="button" class="editor-delete-btn" id="ef-delete" hidden>🗑 Eliminar receta</button>
            <button type="submit" class="editor-save-btn">Guardar receta</button>
          </div>

        </form>
      </div>

    </div>
  </div>

  <!-- FAB — Agregar receta -->
  <button class="fab-add" id="fab-add" aria-label="Agregar mi receta" title="Agregar mi receta">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="22" height="22">
      <path d="M12 5v14M5 12h14"/>
    </svg>
  </button>

  <!-- ═══════════════════════════════════════════
       FOOTER
  ═══════════════════════════════════════════ -->
  <footer class="footer">
    <div class="footer-inner">
      <span class="footer-brand">Las Recetas del Abuelo</span>
    </div>
  </footer>

  <!-- GSAP CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
